<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connections Game - Daily Word Puzzle</title>
    <meta name="description" content="Play Connections game online for free. Group words into categories. A daily puzzle game from New York Times.">
    <meta name="keywords" content="connections, connections game, connections puzzle, daily connections, ny times connections">
    <style>
        body { font-family: Arial; background: #1a1a1a; color: white; margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; }
        h1 { text-align: center; color: #f7d51d; }
        .board { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin: 20px 0; }
        .tile { background: #333; padding: 15px; text-align: center; border-radius: 8px; cursor: pointer; transition: 0.2s; }
        .tile:hover { background: #444; }
        .tile.selected { background: #f7d51d; color: black; }
        .submit { display: block; width: 100%; padding: 15px; background: #f7d51d; color: black; border: none; border-radius: 8px; font-size: 1.1rem; cursor: pointer; margin: 10px 0; }
        .message { text-align: center; padding: 10px; margin: 10px 0; border-radius: 8px; display: none; }
        .success { background: #4caf50; }
        .error { background: #f44336; }
        .seo-content { background: #252525; padding: 20px; margin-top: 30px; border-radius: 10px; }
        .seo-content h2 { color: #f7d51d; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎯 Connections</h1>
        <p style="text-align:center">Create four groups of four!</p>
        
        <div class="board" id="board"></div>
        <button class="submit" onclick="check()">Submit</button>
        
        <div class="message" id="message"></div>
        
        <div class="seo-content">
            <h2>How to Play Connections</h2>
            <p>Connections is a daily word puzzle game where you need to find groups of four words that share a common theme.</p>
            <h2>Tips</h2>
            <ul>
                <li>Look for words that might share a category</li>
                <li>Start with obvious groupings</li>
                <li>You have 4 mistakes allowed</li>
            </ul>
        </div>
    </div>
    
    <script>
        const CATEGORIES = [
            {words: ['APPLE', 'FRUIT', 'RED', 'JUICE'], category: 'Red Things'},
            {words: ['CAT', 'DOG', 'BIRD', 'FISH'], category: 'Pets'},
            {words: ['ONE', 'TWO', 'THREE', 'FOUR'], category: 'Numbers'},
            {words: ['HOT', 'COLD', 'WARM', 'COOL'], category: 'Temperature'}
        ];
        
        let allWords = CATEGORIES.flatMap(c => c.words).sort(() => Math.random() - 0.5);
        let selected = [];
        
        const board = document.getElementById('board');
        allWords.forEach(word => {
            const tile = document.createElement('div');
            tile.className = 'tile';
            tile.textContent = word;
            tile.onclick = () => toggle(tile, word);
            board.appendChild(tile);
        });
        
        function toggle(tile, word) {
            if (selected.includes(word)) {
                selected = selected.filter(w => w !== word);
                tile.classList.remove('selected');
            } else if (selected.length < 4) {
                selected.push(word);
                tile.classList.add('selected');
            }
        }
        
        function check() {
            const msg = document.getElementById('message');
            if (selected.length !== 4) {
                msg.textContent = 'Select 4 words';
                msg.className = 'message error';
                msg.style.display = 'block';
                return;
            }
            msg.textContent = 'Not quite! Try again.';
            msg.className = 'message error';
            msg.style.display = 'block';
            selected = [];
            document.querySelectorAll('.tile').forEach(t => t.classList.remove('selected'));
        }
    </script>
</body>
</html>
